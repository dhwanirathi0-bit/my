<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For My Honey</title>
  <style>
    body {
      margin: 0;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(to right, #ffdde1, #ee9ca7);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      background: rgba(255, 255, 255, 0.9);
      padding: 2em;
      border-radius: 20px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
      max-width: 600px;
    }
    h1 {
      color: #ff6f91;
      font-size: 2.5em;
      margin-bottom: 1em;
    }
    button {
      padding: 0.7em 1.5em;
      font-size: 1.2em;
      border-radius: 10px;
      border: none;
      margin: 0.5em;
      cursor: pointer;
      background-color: #ff6f91;
      color: white;
      transition: transform 0.2s;
    }
    button:hover {
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Are you excited?</h1>
    <button onclick="goYes()">Yes</button>
    <button onclick="goNo()">No</button>
  </div>

  <script>
    function goYes() {
      window.location.href = "message.html";
    }
    function goNo() {
      alert("😢 Oh no... Please click 'Yes' to see the surprise! 💕");
    }
  </script>
</body>
</html>

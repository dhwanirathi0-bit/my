<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Message for My Honey</title>
  <style>
    body {
      margin: 0;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
    }
    .container {
      background: rgba(255, 255, 255, 0.9);
      padding: 2em;
      border-radius: 20px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
      max-width: 700px;
      position: relative;
      z-index: 2;
    }
    h1 {
      color: #ff6f91;
      font-size: 2em;
      margin-bottom: 1em;
    }
    p {
      font-size: 1.3em;
      color: #444;
      line-height: 1.6em;
    }
    .cute-graphic {
      font-size: 3em;
      margin-bottom: 0.5em;
    }
    .heart {
      position: absolute;
      color: #ff6f91;
      font-size: 2em;
      animation: floatUp 6s linear infinite;
    }
    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(1); opacity: 1; }
      100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="cute-graphic">🌸🐻💕</div>
    <h1>Hey Honey 💖</h1>
    <p>
      Just wanted to send a little reminder that I am so proud of you and everything that you do.  
      You are the best and the best thing that ever happened to me.  
      You are my home and my favourite part of my day. 💕
    </p>
  </div>

  <script>
    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.textContent = '💖';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (4 + Math.random() * 3) + 's';
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 7000);
    }

    setInterval(createHeart, 800);
  </script>
</body>
</html>
